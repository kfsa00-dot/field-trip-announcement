<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>光復國小學務處 ─ 校外教學資訊</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Noto Sans TC", "Microsoft JhengHei", "PingFang TC", sans-serif;
      background: #f0f4f8;
      color: #2d3748;
      min-height: 100vh;
    }

    /* 頁首 */
    header {
      background: linear-gradient(135deg, #fde68a 0%, #f59e0b 55%, #d97706 100%);
      color: #78350f;
      padding: 28px 24px 24px;
      text-align: center;
      box-shadow: 0 4px 16px rgba(217,119,6,0.35);
    }
    header .school-label {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 4px;
      opacity: 0.85;
      margin-bottom: 6px;
    }
    header h1 {
      font-size: clamp(22px, 4.5vw, 32px);
      font-weight: 800;
      letter-spacing: 3px;
      color: #431407;
    }
    header .subtitle {
      margin-top: 6px;
      font-size: 13px;
      opacity: 0.65;
    }

    /* 主體 */
    main {
      max-width: 980px;
      margin: 32px auto;
      padding: 0 16px 56px;
    }

    /* 搜尋列 */
    .search-bar {
      margin-bottom: 20px;
    }
    .search-bar input {
      width: 100%;
      padding: 11px 16px;
      border: 1px solid #cbd5e0;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
      background: white;
      transition: border-color .2s, box-shadow .2s;
    }
    .search-bar input:focus {
      border-color: #d97706;
      box-shadow: 0 0 0 3px rgba(217,119,6,.15);
    }

    /* 表格卡片 */
    .table-card {
      background: white;
      border-radius: 14px;
      box-shadow: 0 2px 10px rgba(0,0,0,.08);
      overflow: hidden;
    }
    .card-header {
      padding: 16px 20px;
      background: #f7faff;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .card-header h2 {
      font-size: 15px;
      font-weight: 600;
      color: #4a5568;
    }
    .count-badge {
      background: #d97706;
      color: white;
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 12px;
      font-weight: 600;
    }

    /* 表格 */
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    thead tr {
      background: linear-gradient(90deg, #f59e0b, #d97706);
      color: white;
    }
    thead th {
      padding: 12px 14px;
      font-weight: 600;
      text-align: center;
      white-space: nowrap;
      letter-spacing: 0.5px;
    }
    tbody tr {
      border-bottom: 1px solid #edf2f7;
      transition: background .12s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #fffbeb; }
    tbody td {
      padding: 11px 14px;
      text-align: center;
      white-space: nowrap;
    }
    tbody td.dest-cell {
      text-align: left;
      white-space: normal;
      max-width: 220px;
    }
    .cls-badge {
      display: inline-block;
      background: #fef3c7;
      color: #92400e;
      border-radius: 6px;
      padding: 2px 9px;
      font-weight: 700;
      font-size: 13px;
    }
    .time-cell {
      color: #276749;
      font-weight: 500;
    }

    /* 狀態區塊 */
    .status-box {
      text-align: center;
      padding: 52px 24px;
      color: #718096;
    }
    .status-box .icon { font-size: 40px; margin-bottom: 12px; }
    .status-box p { font-size: 14px; line-height: 1.8; }
    .spinner {
      width: 36px; height: 36px;
      border: 4px solid #e2e8f0;
      border-top-color: #d97706;
      border-radius: 50%;
      animation: spin .75s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 頁尾 */
    footer {
      text-align: center;
      font-size: 12px;
      color: #a0aec0;
      margin-top: 16px;
    }
    footer a { color: #90cdf4; text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* RWD */
    @media (max-width: 540px) {
      thead th, tbody td { padding: 9px 8px; font-size: 13px; }
      header h1 { font-size: 18px; }
    }
  </style>
</head>
<body>

<header>
  <div class="school-label">光復國小學務處公告</div>
  <h1>🚌 校外教學資訊</h1>
  <div class="subtitle">Field Trip Schedule Announcement</div>
</header>

<main>

  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="🔍 搜尋班級、日期或目的地…" oninput="filterTable()" />
  </div>

  <div class="table-card">
    <div class="card-header">
      <h2>📋 出遊行程一覽</h2>
      <span class="count-badge" id="countBadge">載入中…</span>
    </div>
    <div class="table-wrap">
      <div class="status-box" id="statusBox">
        <div class="spinner"></div>
        <p>正在讀取資料，請稍候…</p>
      </div>
      <table id="tripTable" style="display:none;">
        <thead>
          <tr>
            <th>日期</th>
            <th>星期</th>
            <th>班級</th>
            <th>出發時間</th>
            <th>返校時間</th>
            <th>目的地</th>
          </tr>
        </thead>
        <tbody id="tripBody"></tbody>
      </table>
    </div>
  </div>

  <footer>
    <p>資料來源：Google 試算表 ｜ 如有疑問請洽教務處</p>
    <p style="margin-top:5px;">
      <a href="https://github.com/kfsa00-dot/field-trip-announcement" target="_blank">GitHub 儲存庫</a>
    </p>
  </footer>

</main>

<script>
  // ===== 資料來源（Google Apps Script 部署網址）=====
  const GAS_URL = "https://script.google.com/macros/s/AKfycbxlhAMOKuUZVQlF2jsiHIezMoKQsSMsVpCBLgRME7mM_Y3_F_Sci5OzbGSViCFPxwzP/exec";

  let allRows = [];

  // 解析民國年日期字串（格式：115.03.06 或 115/03/06）→ JS Date
  function parseRocDate(str) {
    if (!str) return null;
    const parts = String(str).trim().split(/[.\-\/]/);
    if (parts.length < 3) return null;
    const y = parseInt(parts[0]);
    const m = parseInt(parts[1]);
    const d = parseInt(parts[2]);
    if (isNaN(y) || isNaN(m) || isNaN(d)) return null;
    // 民國年若小於 1912，視為 ROC 紀年，轉換為西元
    const adYear = y < 1912 ? y + 1911 : y;
    return new Date(adYear, m - 1, d);
  }

  // 取今天零時（不含時分秒，方便比較「當天」）
  function todayMidnight() {
    const t = new Date();
    t.setHours(0, 0, 0, 0);
    return t;
  }

  async function loadData() {
    const statusBox = document.getElementById("statusBox");

    try {
      const res = await fetch(GAS_URL);
      if (!res.ok) throw new Error("HTTP " + res.status);
      const data = await res.json();

      if (!Array.isArray(data) || data.length === 0) {
        statusBox.innerHTML = `<div class="icon">📭</div><p>目前沒有校外教學行程資料。</p>`;
        document.getElementById("countBadge").textContent = "0 筆";
        return;
      }

      // 過濾掉今天以前已結束的行程（只保留今天及未來）
      const today = todayMidnight();
      const upcoming = data.filter(r => {
        const d = parseRocDate(r.date);
        return d && d >= today;
      });

      allRows = upcoming;
      renderTable(upcoming);

    } catch (err) {
      statusBox.innerHTML = `
        <div class="icon">❌</div>
        <p>資料讀取失敗：${err.message}<br>
           請確認 Apps Script 已部署，且存取權限設為「任何人」。</p>`;
      document.getElementById("countBadge").textContent = "錯誤";
    }
  }

  function renderTable(rows) {
    const tbody  = document.getElementById("tripBody");
    const table  = document.getElementById("tripTable");
    const status = document.getElementById("statusBox");

    if (rows.length === 0) {
      table.style.display = "none";
      status.style.display = "block";
      status.innerHTML = `<div class="icon">🔍</div><p>找不到符合條件的資料。</p>`;
      document.getElementById("countBadge").textContent = "0 筆";
      return;
    }

    tbody.innerHTML = rows.map(r => `
      <tr>
        <td>${r.date    || "—"}</td>
        <td>${r.weekday ? "（" + r.weekday + "）" : "—"}</td>
        <td><span class="cls-badge">${r.cls || "—"}</span></td>
        <td class="time-cell">${r.depart || "—"}</td>
        <td class="time-cell">${r.arrive || "—"}</td>
        <td class="dest-cell">${r.dest   || "—"}</td>
      </tr>
    `).join("");

    status.style.display = "none";
    table.style.display  = "table";
    document.getElementById("countBadge").textContent = rows.length + " 筆";
  }

  function filterTable() {
    const q = document.getElementById("searchInput").value.trim().toLowerCase();
    if (!q) { renderTable(allRows); return; }
    const filtered = allRows.filter(r =>
      (r.date    || "").toLowerCase().includes(q) ||
      (r.weekday || "").toLowerCase().includes(q) ||
      (r.cls     || "").toLowerCase().includes(q) ||
      (r.dest    || "").toLowerCase().includes(q)
    );
    renderTable(filtered);
  }

  loadData();
</script>

</body>
</html>
